name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run workspace checks
        run: npm run check

      - name: Build workspace
        run: npm run build

      - name: Validate Prisma schema
        run: npm run -w @dca-os-v1/data prisma:validate

      - name: Check data package
        run: npm run -w @dca-os-v1/data check
