name: AI Coding Block
description: Issue form for scoping an AI coding block (Copilot CLI or cloud agent execution).
title: "[AI Block] "
labels: ["ai-block"]
body:
  - type: input
    id: block-name
    attributes:
      label: Block name
      placeholder: "e.g. AI Delivery - Content Draft Backend"
    validations:
      required: true

  - type: input
    id: area-module
    attributes:
      label: Area / module
      placeholder: "e.g. apps/api - AI Delivery"
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What must be implemented or changed by this block?
    validations:
      required: true

  - type: textarea
    id: why-now
    attributes:
      label: Why now
      description: Why is this block needed at this point in the project?
    validations:
      required: true

  - type: textarea
    id: allowed-files
    attributes:
      label: Allowed files
      description: Exact list of files or directories the executor is allowed to touch.
    validations:
      required: true

  - type: textarea
    id: forbidden-areas
    attributes:
      label: Forbidden files / areas
      description: Files, directories, or systems the executor must not touch.
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Explicit non-goals
      description: Features or changes that are out of scope for this block.
    validations:
      required: true

  - type: dropdown
    id: validation-required
    attributes:
      label: Validation required
      options:
        - "Yes - npm.cmd run validate"
        - "No - scaffolding/docs only (git diff --check + git status only)"
    validations:
      required: true

  - type: dropdown
    id: smoke-required
    attributes:
      label: Smoke required
      options:
        - "Yes - smoke:ai-delivery-reviews"
        - "Yes - smoke:local"
        - "Yes - smoke:browser"
        - "No - validate only"
        - "No - scaffolding/docs only"
    validations:
      required: true

  - type: dropdown
    id: risk-level
    attributes:
      label: Risk level
      options:
        - Low - docs / scaffolding only
        - Medium - backend or schema changes
        - High - auth, payments, AI cost, or multi-module
    validations:
      required: true

  - type: dropdown
    id: model-recommendation
    attributes:
      label: Model recommendation
      options:
        - Standard (Copilot CLI default)
        - Extended thinking / Sonnet for complex reasoning
        - Cloud agent for multi-file autonomous work
    validations:
      required: false

  - type: checkboxes
    id: safety-checklist
    attributes:
      label: Safety checklist
      options:
        - label: No commit without explicit human approval
          required: true
        - label: No push without separate explicit human approval
          required: true
        - label: No deploy / VPS changes
          required: true
        - label: No secrets or credentials in output
          required: true
        - label: Stop on validation failure - do not run smoke
          required: true

  - type: checkboxes
    id: final-report-checklist
    attributes:
      label: Final report checklist (executor must complete)
      options:
        - label: Files changed listed
          required: false
        - label: Behavior / scaffolding added described
          required: false
        - label: Backend / schema / runtime changes declared (yes/no)
          required: false
        - label: Validation results included
          required: false
        - label: Smoke results or skip reason included
          required: false
        - label: Risk notes included
          required: false
        - label: Git status included
          required: false
        - label: No commit / push / deploy confirmed
          required: false
