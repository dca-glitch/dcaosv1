services:
  dcaosv1-api:
    container_name: dcaosv1-api
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PORT: "4000"
    depends_on:
      dcaosv1-postgres:
        condition: service_healthy
    expose:
      - "4000"
    restart: unless-stopped
    networks:
      - dca_net

  dcaosv1-postgres:
    container_name: dcaosv1-postgres
    image: postgres:16-bookworm
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - dcaosv1_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dca_net

volumes:
  dcaosv1_postgres_data:

networks:
  dca_net:
    external: true
